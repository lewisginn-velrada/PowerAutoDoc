# doc-gen.config.yml
# vel-docgen configuration — copy this to your client project root and customise

solutions:
  - path: ./unpacked/LeaveManagement
    publisherPrefix: vel
    role: all
    displayName: Leave Management

  - path: ./unpacked/ISMSPlugins
    publisherPrefix: isms
    role: all
    displayName: ISMS Plugins

  - path: ./unpacked/ISMSWebResources
    publisherPrefix: isms
    role: webresources
    displayName: ISMS Web Resources

output:
  path: ./output

parse:
  customColumnsOnly: false
  excludeBaseCurrencyFields: true
  excludeStandardRelationships: true
  excludedColumns:
    - timezoneruleversionnumber
    - utcconversiontimezonecode
    - importsequencenumber
    - overriddencreatedon
    - exchangerate
    - transactioncurrencyid
    - owningteam
    - owninguser
    - owningbusinessunit
    - createdonbehalfby
    - modifiedonbehalfby
    - versionnumber

render:
  formLayout: compact

components:
  tables: true
  forms: true
  views: true
  relationships: true
  flows: true
  plugins: true
  webResources: true 
  security: false    # Phase 3 — not yet built

wiki:
  organisation: VelLab
  project: Velrada-DocGen
  wikiIdentifier: Velrada-DocGen.wiki
  parentPath: /Leave Management (App)
  pat: REDACTED